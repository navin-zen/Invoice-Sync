
{% block content %}
<div class="mt-3 card">
        <div class="table-responsive">
        <table class="table table-bordered table-striped table-sm">
            <thead class="thead-inverse">
                <tr>
                    <th class="text-center"> Configured Emails </th>
                </tr>
            </thead>
            {% for o in view.settings_info.get_notification_emails %}
                <tr>
                    <td class="text-center">
                        {{ o }}
                    </td>
                </tr>
            {% empty %}
                <tr><td class="text-center">No Emails Configured</td></tr>
            {% endfor %}
        </table>
        </div>
</div>

{% endblock content %}
