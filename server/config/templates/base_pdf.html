{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Computer generated PDF{% endblock %}</title>
    <meta name="author" content="Generated by GSTZen (www.gstzen.in)" />
<style>

@page {
    {% block pageSize %}
        size: A4 portrait;
    {% endblock %}
    {% block pageMargin %}
        margin: 2cm 1.5cm 1.5cm 1.5cm;
    {% endblock %}
    {% if debug %}
        border: 1px black dotted;
    {% endif %}
    {% block pageSurroundings %}{% endblock %}
}

{% block customCss %}
{% endblock customCss %}

#company-logo {
    position: fixed;
    {% block logoPosition %}
        top: -1.5cm;
        left: -1cm;
    {% endblock %}
}

#draft-watermark {
    position: fixed;
    top: 40%;
    right: 15%;
    font-size: 5cm;
    color: #eeeeee;
    opacity: 1;
    transform: rotate(-45deg);
    z-index: -1;
    display: {% block draftWatermark %}none{% endblock %};
}

{% block fontSpec %}
html, body { font: 11pt Fontin, serif !important; -weasy-hyphens: auto }
{% endblock %}

.page-break {
    page-break-before: always;
}

h1, h2 {
    page-break-before: always;
    text-align: center;
}

h3 {
    text-align: center;
}

table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
}

.table-bordered tr
{
    border-color: #444444;
    border-style: solid;
    border-width: 0.75px 0;
}

.table-bordered tr:first-child,
.table-bordered tr.top-row {
    border-top-width: 1.5px;
}

.table-bordered tr:last-child,
.table-bordered tr.bottom-row {
    border-bottom-width: 1.5px;
}

.table-bordered tr.top-row-not {
    border-top-width: 0.375px !important;
}
.table-bordered tr.bottom-row-not {
    border-bottom-width: 0.375px !important;
}

td {
    vertical-align: top;
    padding: 3px 3px;
}

.table-bordered td {
    border-color: #444444;
    border-style: solid;
    border-width: 0 0.75px;
}

.table-bordered td:first-child,
.table-bordered td.left-column {
    border-left-width: 1.5px;
}

.table-bordered td:last-child,
.table-bordered td.right-column {
    border-right-width: 1.5px;
}

.table-bordered td.left-column-not {
    border-left-width: 0.375px !important;
}
.table-bordered td.right-column-not {
    border-right-width: 0.375px !important;
}

.text-vmiddle {
    vertical-align: middle;
}

.text-vbottom {
    vertical-align: bottom;
}

.text-center { text-align: center; }
.text-right  { text-align: right; }
.text-left   { text-align: left; }

.width-definition-row {
    padding-top: 0;
    padding-bottom: 0;
}

span.missing {
    font-style: italic;
    /* color: red; */
}

.cz-no-bookmark {
    -weasy-bookmark-level: none;
}

.cz-bookmark-1 { -weasy-bookmark-level: 1; }
.cz-bookmark-2 { -weasy-bookmark-level: 2; }
.cz-bookmark-3 { -weasy-bookmark-level: 3; }
.cz-bookmark-4 { -weasy-bookmark-level: 4; }
.cz-bookmark-5 { -weasy-bookmark-level: 5; }
.cz-bookmark-6 { -weasy-bookmark-level: 6; }

</style>
</head>
<body>
{% block logos %}
    {% include 'base_pdf/logo.html' %}
{% endblock logos %}
<div id="draft-watermark">Draft</div>
<div id="content">{% block content %}{% endblock %}</div>
</body>
</html>
