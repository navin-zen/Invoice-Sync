{% if help_videos %}
<div class="modal fade bd-example-modal-lg" id="help-video-modal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Help Videos for this page</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
          <div class="responsive">
              <div class="row">
                  {% for hv in help_videos %}
                      <div class="col-sm-4">
                          <figure class="figure">
                              <a href="https://www.youtube.com/watch?v={{ hv.youtube_id }}" target="_blank">
                                  <img class="img-fluid img-thumbnail"
                                      src="https://i3.ytimg.com/vi/{{ hv.youtube_id }}/maxresdefault.jpg"
                                      class="rounded-sm figure-img img-fluid" alt="text">
                                  <figcaption class="figure-caption">{{ hv.title }}</figcaption>
                              </a>
                          </figure>
                      </div>
                  {% endfor %}
              </div>
          </div>
      </div>
    </div>
  </div>
</div>
{% endif %}
