<!-- Begin crisp.chat -->
{% if debug %}
<!-- Disabling crisp.chat in Debug -->
{% else %}
<script type="text/javascript">window.$crisp=[];window.CRISP_WEBSITE_ID="0784bb05-12e5-4f9f-b5fb-2e828026517c";(function(){d=document;s=d.createElement("script");s.src="https://client.crisp.chat/l.js";s.async=1;d.getElementsByTagName("head")[0].appendChild(s);})();
{% if request.user and request.user.is_authenticated %}
    $crisp.push(["set", "user:email", "{{ request.user.email }}"]);
    $crisp.push(["set", "user:nickname", "{{ request.user.get_fullname|urlencode }}"]);
{% endif %}
</script>
{% endif %}
<!-- End crisp.chat -->
